# Peers loop configuration. See `peers --help` for full reference.

driver: orchestrator          # orchestrator | hooks (peers tick) | sessions
comm: git                     # git | hybrid (git for code + files for messages)

# Opt-in caged graphify code knowledge-graph MCP (off by default). When true,
# `peers-ctl start` builds an offline AST graph of the repo inside a
# supply-chain cage and serves it to the peers over an api-key-gated MCP, so
# agents can prefer graph navigation (callers / blast-radius / shortest-path)
# over grep. Fail-open: any failure (no podman/image) continues with no graph.
# In --container runs it shares the egress/auth-proxy network; with all proxies
# off (e.g. PODMAN_NETWORK=host) there is no shared netns to join, so it
# fail-opens to no-graph. The PEERS_CTL_NO_GRAPHIFY=1 kill-switch forces it off.
graphify_mcp: false

# Extra egress hosts the --container peers may reach, as tinyproxy host-regex
# strings appended to the egress-proxy allow-list (on top of the LLM API hosts).
# Use this to let a peer fetch a spec / research source. Anchor each pattern.
# Off by default (no extra egress). Example (e.g. for an RFC/spec review):
#   egress_allow:
#     - '^rfc-editor\.org$'
#     - '^datatracker\.ietf\.org$'
#     - '^www\.w3\.org$'

# Opt-in web modality for `peers research --modalities codebase,web`. OFF by
# default (codebase-only research is honest but produces no URL-cited report).
# When enabled, the research frontend fetches the operator's seed_urls through an
# allowlisted, SSRF-guarded, fail-closed fetcher (host must match an anchored
# `allow` regex AND not be loopback/private/link-local). seed_urls are the sources
# the operator scopes research to (no search-engine API is used). Set `proxy` to
# route through the egress proxy. Deny-by-default: an empty allow fetches nothing.
#   research:
#     web:
#       enabled: true
#       allow:
#         - '^rfc-editor\.org$'
#         - '^datatracker\.ietf\.org$'
#       seed_urls:
#         - 'https://www.rfc-editor.org/rfc/rfc8259'
#       proxy: null        # or 'http://127.0.0.1:8080' for the egress proxy
#       max_bytes: 5242880

# declare peers as an ordered list so n>=2 setups are
# possible. Legacy `tools: {claude: ..., codex: ...}` shape is also
# accepted and auto-promoted.
peers:
  - name: claude
    tool: claude
    # Optional semantic controls. Explicit argv flags still win.
    # model: opus
    # reasoning: high              # low|medium|high|xhigh|max
    # provider: anthropic          # anthropic|openrouter
    # `{PROMPT}` is substituted with the current peer prompt at runtime.
    #
    # Default: stream-json + verbose. Each tool call / text /
    # tool-result is emitted as a JSON line to stdout, giving
    # HealthGuard a real-time liveness signal. The final result line
    # carries token/USD totals for budget accounting.
    #
    # If you need human-readable peer logs, swap back to:
    #   argv: ["claude", "-p", "--dangerously-skip-permissions", "{PROMPT}"]
    # In that silent print-mode shape HealthGuard still has the
    # claude-session-jsonl mtime fallback.
    argv: ["claude", "-p", "--dangerously-skip-permissions",
           "--output-format", "stream-json", "--verbose", "{PROMPT}"]
    prompt_mode: argv-substitute     # claude/codex don't read prompts from stdin

  - name: codex
    tool: codex
    # Default to the latest model at the highest reasoning effort. xhigh IS
    # codex's max effort — there is no "pro"/"max" tier on the codex CLI (those
    # are API/opencode tiers). Override per-project; an explicit argv -m /
    # -c model=... still wins.
    model: gpt-5.5
    reasoning: xhigh             # minimal|low|medium|high|xhigh
    # provider: openai             # openai|openrouter
    # `--dangerously-bypass-approvals-and-sandbox` disables codex's
    # internal bubblewrap `workspace-write` sandbox. We rely on the
    # outer peers container (cap-drop=ALL, no-new-privileges,
    # pids-limit, user-ns) as the sandbox boundary instead. Without
    # this flag, codex's workspace-write mode treats `.git/` as
    # read-only and silently blocks `git commit`, producing
    # `no-handoff head=no-new-commit` ticks and DEGRADED state
    # even when codex produced valid fixes.
    #
    # `--json` (Option C, v15 internal testing follow-up): codex emits its turn as a
    # JSONL event stream. The substrate keys peer-unavailable halts off the
    # structured `error`/`turn.failed` events (echo-immune — the agent's own
    # text, where a `git log` echo would land, is a separate `agent_message`
    # event, so it cannot forge a quota/auth halt), and reads token usage from
    # the `turn.completed.usage` event. Trade-off: codex's raw output in logs
    # is JSONL rather than free text.
    argv: ["codex", "exec", "--json", "--dangerously-bypass-approvals-and-sandbox", "{PROMPT}"]
    prompt_mode: argv-substitute

  # Example 3-peer setup (uncomment + adjust to enable):
  # - name: claude-2
  #   tool: claude
  #   argv: ["claude", "-p", "--dangerously-skip-permissions", "{PROMPT}"]
  #   prompt_mode: argv-substitute

  # opencode as a first-class peer (universal model gateway). `--format json`
  # gives the substrate the same structured channel as claude/codex: token +
  # cost accounting from `step-finish` events and echo-immune auth/quota halt
  # detection from `error` events. `--dangerously-skip-permissions` makes it
  # autonomous (auto-approves tool use), same role as claude's flag.
  #
  # `model` is opencode's `<provider>/<model>` string (do NOT set `provider:`
  # separately). This is how you run LOCAL models: configure the provider once
  # in opencode's own config (`opencode providers` / opencode.json — ollama,
  # vllm, llama.cpp, lmstudio, any OpenAI-compatible endpoint), then:
  #   model: ollama/qwen2.5          # local via ollama
  #   model: openai-compatible/<m>   # local vllm / llama.cpp server
  #   model: anthropic/claude-...    # cloud, via opencode
  # reasoning: high                  # → --variant high (provider-specific)
  # - name: opencode
  #   tool: opencode
  #   model: ollama/qwen2.5
  #   argv: ["opencode", "run", "--format", "json", "--dangerously-skip-permissions", "{PROMPT}"]
  #   prompt_mode: argv-substitute

budget:
  max_iterations: 200
  max_runtime_s: 21600        # 6 hours total wall clock
  max_consecutive_failures: 5
  # max_tokens: 1_000_000     # optional cap on total tokens (claude+codex)
  # max_usd: 50.0             # optional cap on accumulated USD spend
  # max_usd_mode controls how `max_usd` is enforced:
  #   auto (default) — inspect claude/codex auth files; if any peer is
  #     API-key-billed → hard; if all peers are OAuth-billed → warn.
  #     ↳ matches the real billing model (OAuth users pay a flat
  #       subscription; per-token USD is informational only).
  #   hard — exit on cap.
  #   warn — log a one-time warning at the threshold; do NOT exit.
  #   off  — ignore `max_usd` entirely.
  max_usd_mode: auto

health:
  # Kill the peer only if it has produced NO output for this many seconds
  # (i.e. it appears genuinely stuck, not just thinking long). Heavy
  # stacks (~25 goals + many soft reviews) can have peers think 20-40
  # min between outputs. 30 min is a sane default; bump higher for
  # slower models or extra-large prompts.
  idle_timeout_s: 1800               # 30 min
  # Hard safety ceiling for runaway processes; should be much higher
  # than the typical per-tick duration. 4h covers thorough's deeper
  # reviews; tune down if you only run --modes=audit.
  absolute_max_runtime_s: 14400      # 4 hours
  # Per-stream output buffer cap. Outputs larger than this get head/tail-
  # truncated, with a marker line in the middle. Raise for chatty peers
  # (e.g. claude --debug or codex with verbose ROM dumps).
  buf_cap_bytes: 2097152             # 2 MiB
  # Regex patterns to look for in stdout/stderr; first match classifies
  # the run as api-error and kills the child immediately.
  #
  # Self-referential trap to avoid: naive patterns ("Rate limit
  # exceeded", "API error 5xx", "Authentication failed") match their
  # OWN echo whenever a peer `cat`'d this very config.yaml. The form
  # below requires an ERROR/FATAL log keyword on the SAME line as
  # the failure mode. Real codex/claude error logs always carry such
  # a keyword (e.g. `2026-... ERROR codex_core::client: API error
  # 503: service unavailable`); a YAML quoted-list echo (`    -
  # "API error 5[0-9][0-9]"`) does not.
  #
  # (?m) = multi-line (^ matches every line start). CASE-SENSITIVE by
  # design (BUG-121, v15 internal testing 2026-06-04): real claude/codex halt
  # lines emit uppercase ERROR/FATAL, while lowercase prose narrating an
  # incident ("the error was that quota exhausted") must not halt the run.
  #
  # `[^"\n]*?` (not `.*`) sits between line-start and the ERROR/FATAL
  # keyword. This blocks two follow-up traps: (a) peer runs `grep
  # ERROR tests/` and the quoted test fixture content matches; (b)
  # YAML block-scalar dumps span multiple lines without quotes so a
  # bare `.*` would scan across line boundaries. Strict single-line,
  # quote-free prefix is required.
  error_patterns:
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\brate.?limit\\b"
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\bAPI[ _-]?error\\b[^\"\\n]*?\\b5[0-9][0-9]\\b"
    - "(?m)^Error:\\s*rate[_-]?limit"

  # halt_patterns trigger an IMMEDIATE `peer-unavailable:<peer>`
  # exit_event instead of the silent degrade-after-3 path. Intended
  # for classes the operator MUST address (OAuth expired, quota
  # exhausted, invalid API key); silently degrading wastes the run's
  # budget on a peer that can never recover by itself.
  #
  # Quota/usage_limit patterns also require an ERROR/FATAL keyword on
  # the same line: the substrate's OWN goal description text mentions
  # "quota exhausted" as the user-facing reason, and a peer dumping
  # that yaml to stderr would otherwise false-positive. ERROR/FATAL
  # anchoring + `[^"\n]*?` line-bounded prefix closes that variant.
  halt_patterns:
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\bauthentication[ _-]?(failed|error)\\b"
    - "(?m)^Error:\\s*authentication[_-]?(error|failed)"
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\b(invalid|missing|expired)[ _-]?api[ _-]?key\\b"
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\bquota[ _-]?exhausted\\b"
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\busage[ _-]?limit[ _-]?(reached|exceeded|exhausted)\\b"
    # ChatGPT/codex emit "ERROR: You've hit your usage limit. Visit
    # https://chatgpt.com/codex/settings/usage ..." — the phrase is
    # "hit your usage limit" with NO reached/exceeded/exhausted
    # qualifier, so the line above misses it. Without this, a quota-dead
    # codex is misclassified as a retryable process-fail and its empty
    # ticks count toward max_consecutive_failures, killing a run the
    # other peer could have finished solo (v14 internal testing finding).
    # ERROR/FATAL-anchored + line-bounded so it can't self-match the
    # substrate's own goal text.
    - "(?m)^[^\"\\n]*?\\b(ERROR|FATAL)\\b[^\"\\n]*?\\bhit your usage limit\\b"

# Operator observability knobs (host-side; never affect the loop's
# decisions). Default OFF -> a normal launch is byte-identical.
observability:
  # Wave-2 TUI live tee: mirror each peer's live stdout/stderr into
  # `.peers/log/peers/tick-<N>-<peer>.stream.jsonl` AS IT HAPPENS, so the
  # `peers-ctl tui` Live-Stream window can tail codex/opencode in real time
  # (claude is already live via its session jsonl). Fail-closed: a tee error
  # can never disturb the peer's liveness/idle-timeout. Also enableable
  # without editing config via `PEERS_TEE_STREAM=1`.
  tee_stream: false

# Hard-goal commands (pytest, ruff, custom checks) run with a
# per-command wall-clock timeout. Default 120 s suffices for small
# projects; raise it for large repos whose `pytest -q` legitimately
# takes longer (large test suites typically peg at 75-150 s
# depending on cache state).
goals:
  timeout_s: 120
  # Convergence-wall halt: after `stuck_halt_after` consecutive red
  # ticks on a watched gate, the run exits cleanly with `stuck:<gate>`
  # instead of burning budget until max_runtime. 0 disables it.
  # stuck_halt_after: 5
  # stuck_halt_gates: ["tests-pass", "no-prior-regression"]
  #
  # Progress-aware reset: gates listed here have their red streak
  # forgiven whenever a PLAN step is completed on a tick — so a run only
  # halts on genuine NO-progress, not on a terminal gate that is red by
  # design while a multi-step build is still in flight. Implement-mode
  # defaults to the full watched-halt set ["tests-pass",
  # "no-prior-regression"] (both are env-fragile / red-by-design during a
  # multi-step build); other modes default to [] (there a red gate IS a
  # real stuck signal). Set [] to disable, or override the list.
  # stuck_progress_reset_gates: ["tests-pass", "no-prior-regression"]
