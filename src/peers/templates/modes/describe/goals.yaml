goals:
  - id: description-files-present
    type: hard
    description: |
      SPEC.md, ARCHITECTURE.md, and DESIGN.md exist at the repo root,
      each at least 500 characters. These are the deliverables of the
      describe run; without them the mode hasn't produced anything yet.
    cmd: "python3 .peers/checks/description_files_present.py ."
    pass_when: "exit_code == 0"

  - id: description-sections-present
    type: hard
    description: |
      The three description files have the required sections — SPEC.md
      contains `## Threat Model`, `## Invariants`, `## API`;
      ARCHITECTURE.md contains `## Components` and `## Data Flow`;
      DESIGN.md contains `## Decisions` and `## Tradeoffs`. Each
      section heading must be followed by at least 50 chars of content,
      otherwise a peer can pass by inserting empty headings.
    cmd: "python3 .peers/checks/description_sections_present.py ."
    pass_when: "exit_code == 0"

  - id: description-converged
    type: hard
    description: |
      The last N commits touching the description files (default N=2,
      override via .peers/config.yaml goals.describe_convergence_n) are
      non-substantive: each adds <100 lines AND adds no new `##`-level
      section AND has <50% deletion ratio. Substantive edits in the
      most recent N commits indicate the doc is still in flux — the
      peer-loop should continue.
    cmd: "python3 .peers/checks/description_converged.py ."
    pass_when: "exit_code == 0"

  - id: describe-skeptic-pass
    type: soft
    reviewer: both
    consensus_needed: 2
    review_interval: 1
    prompt: |
      You are reviewing SPEC.md, ARCHITECTURE.md, DESIGN.md — not source code.
      Look SPECIFICALLY for:
        - Which claims are not backed by source evidence? (e.g.
          "We use OAuth" — where in the code does that happen?)
        - Which tradeoffs are presented one-sidedly? ("We chose
          X because it's simpler" — simpler than WHAT?)
        - Which sections are vacuously phrased? (a threat-model that only
          says "we validate input" without naming the attack surface)
        - Which missing sections would complete the doc-set?
      Reply {"pass": true, "notes": "describe-skeptic-pass: <concrete reviews>"}
      A blanket "looks good" is rejected — the other peer needs
      concrete diffs/section-names/quoted-claims.

  - id: describe-tradeoff-honesty
    type: soft
    reviewer: both
    consensus_needed: 2
    review_interval: 2
    prompt: |
      Strict tradeoff honesty in DESIGN.md. For EVERY design decision in
      `## Decisions`, `## Tradeoffs` must contain at least 3 explicit
      tradeoffs. Forbidden without further justification:
        - "obviously the right choice"
        - "it just works"
        - "simple solution"
        - "industry standard"
      Instead: state concretely what we GIVE UP by the decision, what
      the ALTERNATIVE would be, why WE judge the cost of the alternative
      to be higher. Reply with pass=true + list of reviewed decisions:
      {"pass": true, "notes": "decisions reviewed: [D1, D2, ...], all have ≥3 tradeoffs each"}.
