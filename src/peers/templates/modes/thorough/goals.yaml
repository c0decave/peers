goals:
  - id: skeptic-pass
    type: soft
    reviewer: both
    consensus_needed: 2
    review_interval: 1
    prompt: |
      The previous audit concluded "all green". That is suspicious.
      Go through EVERY src file again and find at least 1 bug the
      previous rounds missed. If, after a conscientious search,
      there really is nothing:
      - document CONCRETELY which 5 failure modes you checked +
        ruled out (per file or per module)
      - reply {"pass": true, "notes": "skeptic-pass: <N files reviewed, M failure-modes excluded with rationale>"}
      A blanket "clean" is rejected by the other peer.

      ADDITIONALLY: check every @pytest.mark.skip / @pytest.mark.xfail in
      the tests/ tree. Is the `reason=` justification ACTUALLY solid or
      does it hide a real bug that was simply silenced? If
      suspicious → file a Bug-Report. "TODO"/"FIXME"/"flaky" as a justification
      is always suspicious — the corresponding hard-goal check
      `tests-no-unjustified-skip-or-fail` would reject it anyway, but
      you must additionally check semantically whether the justification *holds*.

  - id: aggressive-honesty
    type: soft
    reviewer: both
    consensus_needed: 2
    review_interval: 3
    prompt: |
      Stricter honesty variant. You are NOT done as long as you cannot
      concretely justify, for EVERY src top-level path:
      - Which 3+ failure modes did you check there?
      - Which 2+ vulnerability categories did you check?
      - Which test-coverage gap did you explicitly mark as "not in
        scope" (instead of simply overlooking it)?
      For every "no idea, didn't look at it": file
      Bug-Report:investigate-<X> with severity info NOW.
      Reply {"pass": true, "notes": "<path>: <findings> | ..."}.
      A blanket "checked everything" is rejected.

  - id: convergence-reached
    type: hard
    description: "N=3 consecutive ticks without new blocking/shallow Bug-Reports. Default N=3; override via .peers/config.yaml goals.convergence_n."
    cmd: "python3 .peers/checks/convergence_reached.py ."
    pass_when: "exit_code == 0"

  - id: all-peers-healthy
    type: hard
    description: "Fails when any peer is `unavailable`. Operator action required — silent degrade-and-skip is no longer accepted."
    cmd: "python3 .peers/checks/all_peers_healthy.py ."
    pass_when: "exit_code == 0"
