# tinyproxy config for peers-egress-proxy.
# See proxy/filter-allow.txt for the hostname allow-list (regex per line).

User tinyproxy
Group tinyproxy

Port 3128
# Listen on loopback only. The main peers container shares this
# network namespace via --network=container:peers-egress-proxy_*,
# so 127.0.0.1 here = the same loopback the peer sees. No need to
# expose on other interfaces — and doing so would let any colocated
# process reach the proxy directly.
Listen 127.0.0.1
# `BindSame` would force the outbound socket to bind to the same
# interface as the listener; that breaks for IPv6 since the listener
# is IPv4-only. Let the kernel pick the outbound source IP.

# Idle timeout in seconds — LLM API requests can be slow (large
# completions take 30-120 s). 600 s gives margin without leaking
# zombie sockets.
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatHost "tinyproxy.stats"
LogLevel Info
LogFile "/var/log/tinyproxy/tinyproxy.log"
PidFile "/run/tinyproxy/tinyproxy.pid"
MaxClients 64

# Loopback only — the peers container talks to us on 127.0.0.1.
Allow 127.0.0.0/8
Allow ::1

# Permit HTTPS CONNECT to standard TLS ports only. Add 80 to allow
# plain-HTTP fallback if an API ever needs it (none today).
ConnectPort 443
ConnectPort 80

# Hostname allow-list: anything matching `filter` proceeds; everything
# else 403s. `FilterDefaultDeny Yes` is the critical flag here.
Filter "/tmp/tinyproxy-filter"
FilterDefaultDeny Yes
FilterCaseSensitive No
# tinyproxy 1.11+ replaced FilterExtended with FilterType.
# "ere" = extended POSIX regex (what our anchored ^…$ patterns need).
FilterType ere
FilterURLs Off

ViaProxyName "peers-egress"
